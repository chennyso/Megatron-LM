model: qwen3_32b
seq_lengths: [4096]
micro_batch_size: 1
precision: bf16
activation_checkpointing: true
distributed_optimizer: true
train_iters: 6
warmup_iters: 2
profile_start_iter: 3
profile_end_iter: 4
repeat: 1
overlap_modes: [baseline]
experiments:
  # Test 1: VPP1 baseline (no VPP)
  - name: q32_pp4_dp2_tp2_vpp1
    pp: 4
    dp: 2
    tp: 2
    vpp: 1
  # Test 2: VPP2
  - name: q32_pp4_dp2_tp2_vpp2
    pp: 4
    dp: 2
    tp: 2
    vpp: 2
  # Test 3: VPP4 baseline (current)
  - name: q32_pp4_dp2_tp2_vpp4
    pp: 4
    dp: 2
    tp: 2
    vpp: 4
  # Test 4: VPP2 with MBS2
  - name: q32_pp4_dp2_tp2_vpp2_mbs2
    pp: 4
    dp: 2
    tp: 2
    vpp: 2
    micro_batch_size: 2
  # Test 5: TP1 PP8 (remove TP communication)
  - name: q32_pp8_dp2_tp1_vpp1
    pp: 8
    dp: 2
    tp: 1
    vpp: 1
  # Test 6: TP1 PP8 VPP2
  - name: q32_pp8_dp2_tp1_vpp2
    pp: 8
    dp: 2
    tp: 1
    vpp: 2
  # Test 7: TP4 PP2 (increase TP, reduce PP)
  - name: q32_pp2_dp2_tp4_vpp1
    pp: 2
    dp: 2
    tp: 4
    vpp: 1
  # Test 8: TP4 PP2 VPP2
  - name: q32_pp2_dp2_tp4_vpp2
    pp: 2
    dp: 2
    tp: 4
    vpp: 2
