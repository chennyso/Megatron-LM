model: qwen3_32b
seq_lengths: [2048, 4096, 8192]
micro_batch_size: 1
precision: bf16
activation_checkpointing: true
distributed_optimizer: true
train_iters: 30
warmup_iters: 10
profile_start_iter: 12
profile_end_iter: 16
repeat: 3
overlap_modes: [baseline, p2p_overlap, dp_overlap, all_overlap]
